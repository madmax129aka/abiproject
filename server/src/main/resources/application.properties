# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/skillswap?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=5000
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT
app.jwt.secret=skillswap_super_secret_jwt_key_2024_spring_boot
app.jwt.expiration=604800000

# Gemini AI
app.gemini.api-key=your_gemini_api_key_here

# Upload directory
app.upload.dir=uploads/certificates

# CORS
app.cors.allowed-origins=http://localhost:5173
